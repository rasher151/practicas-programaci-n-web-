<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./wwwroot/js/script.js"></script>
  </head>
  <body>
    <div class="col-lg-5 mx-auto p-4 py-md-5">
      <header class="d-flex align-items-center pb-3 mb-5 border-bottom">
        <h2 class="text-success">Agregar usuario</h2>
      </header>
      <main id="main">
        <form id="form-registro-usuarios">
          <div class="row g-3">
            <div class="col-12">
              <label>Nombre completo</label>
              <input type="text" class="form-control" id="nombre" placeholder="Usuario">
            </div>
            <div class="col-12">
              <label>Password</label>
              <input type="password" class="form-control" id="pwd">
            </div>
            <div class="col-12">
              <label>Email</label>
              <input type="email" class="form-control" id="email" placeholder="you@example.com">
            </div>
            <div class="col-12">
              <button class="w-100 btn btn-primary btn-lg" type="button" onclick="registroUsuarios();">Guardar usuario</button>
            </div>
          </div>
        </form>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
