<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Ajax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./wwwroot/js/script.js"></script>
  </head>
  <body>
    <main id="content" class="container pt-5">
      <div class="row">
        <div class="col-12 col-lg-4">
          <div id="contenido-imagen">
            <img src="./wwwroot/img/woman.png" class="img-fluid" style="height: 400px;">
          </div>
          <div class="d-flex justify-content-between pt-3">
            <button class="btn btn-outline-success" onclick="resetImage();">
              <i class="bi bi-arrow-counterclockwise fw-bold fs-5 pe-2"></i>
              Reiniciar
            </button>
            <button class="btn btn-outline-primary" onclick="changeImage();">
              <i class="bi bi-arrow-left-right fw-bold fs-5 pe-2"></i>
              Cambiar
            </button>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
